---
name: Build, test & publish terrarium

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

################################################################################
# 1 ────────── Build & test (matrix: amd64 + arm64) ───────────────────────────
################################################################################
jobs:
  build:
    name: Build & test (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: -linux-amd64
          - platform: linux/arm64
            runner: ubuntu-22.04-arm
            suffix: -linux-arm64

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dump-context
      - uses: docker/setup-buildx-action@v3

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          flavor: latest=auto,suffix=${{ matrix.suffix }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gate: build through the test stage — bats must pass
      # Uses a retry loop to handle transient 502 errors from GHA cache / GHCR
      - name: Build & run tests
        run: |
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            docker buildx build \
              --file docker/Dockerfile.terrarium \
              --target test \
              --platform ${{ matrix.platform }} \
              --cache-from type=gha,scope=${{ matrix.platform }} \
              --cache-to type=gha,mode=max,scope=${{ matrix.platform }} \
              ./docker \
              && { echo "::endgroup::"; break; } \
              || { echo "::endgroup::"; echo "::warning::Build attempt $attempt failed"; }
            if [ "$attempt" -eq 3 ]; then echo "::error::All 3 build attempts failed"; exit 1; fi
            sleep 30
          done

      # Push: build the clean final stage (no test artifacts)
      - name: Build & push final image
        if: github.event_name != 'pull_request'
        env:
          META_TAGS: ${{ steps.meta.outputs.tags }}
          META_LABELS: ${{ steps.meta.outputs.labels }}
        run: |
          # Build --tag and --label flags from newline-separated metadata outputs
          tag_flags=""
          while IFS= read -r tag; do
            [ -n "$tag" ] && tag_flags="$tag_flags --tag $tag"
          done <<< "$META_TAGS"

          label_flags=""
          while IFS= read -r label; do
            [ -n "$label" ] && label_flags="$label_flags --label $label"
          done <<< "$META_LABELS"

          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            docker buildx build \
              --file docker/Dockerfile.terrarium \
              --target final \
              --platform ${{ matrix.platform }} \
              --push \
              --sbom=true \
              --cache-from type=gha,scope=${{ matrix.platform }} \
              $tag_flags \
              $label_flags \
              ./docker \
              && { echo "::endgroup::"; break; } \
              || { echo "::endgroup::"; echo "::warning::Push attempt $attempt failed"; }
            if [ "$attempt" -eq 3 ]; then echo "::error::All 3 push attempts failed"; exit 1; fi
            sleep 30
          done

  ################################################################################
  # 2 ────────── Create multi‑arch manifest ────────────────────────────────────
  ################################################################################
  manifest:
    name: Create & push multi-arch manifest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dump-context

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version tag
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate manifest tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest

      - name: Create and push manifest
        uses: int128/docker-manifest-create-action@v2
        with:
          tags: ${{ steps.meta.outputs.tags }}
          sources: |
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-linux-amd64
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.tag }}-linux-arm64
