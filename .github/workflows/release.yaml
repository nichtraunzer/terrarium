---
# ── Permissions policy ──────────────────────────────────────────────────────
# Default: contents:read (workflow level).
# contents:write — release job only (auto-create tag if missing).
# packages:write — release/manifest jobs only (GHCR push).
# ── Secret isolation policy ─────────────────────────────────────────────────
# No secrets in global env: blocks.
# GITHUB_TOKEN scoped to docker/login-action steps only.
name: Release terrarium (manual)

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v4.7.0)"
        required: true
      debug_context:
        description: "Dump GitHub contexts for debugging"
        type: boolean
        default: false

permissions:
  contents: read

################################################################################
# 1 ────────── Build, test & push (matrix: amd64 + arm64) ───────────────────
################################################################################
jobs:
  release:
    name: Build & release (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    permissions: { contents: write, packages: write }
    strategy:
      fail-fast: true
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-24.04
            suffix: -linux-amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: -linux-arm64

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Ensure tag exists (create on HEAD if missing)
        run: |
          # Resolve tag from release event or workflow_dispatch input
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi

          # Validate tag for both Git and Docker usage
          if [ -z "$TAG" ]; then
            echo "::error::Tag input must not be empty"; exit 1
          fi
          if [ "${#TAG}" -gt 128 ]; then
            echo "::error::Tag '${TAG}' is too long (max 128 characters)"; exit 1
          fi
          case "$TAG" in
            -*) echo "::error::Tag '${TAG}' must not start with '-'"; exit 1 ;;
            *[!0-9A-Za-z_.-]*) echo "::error::Tag '${TAG}' contains invalid characters. Allowed: A-Z, a-z, 0-9, '_', '-', '.'"; exit 1 ;;
          esac

          if git rev-parse "refs/tags/${TAG}" >/dev/null 2>&1; then
            echo "Tag '${TAG}' already exists at $(git rev-parse "refs/tags/${TAG}")"
          else
            echo "Tag '${TAG}' does not exist — creating on HEAD ($(git rev-parse HEAD))"
            git tag -- "${TAG}"
            # Race-safe: if the other matrix leg pushed first, detect and fetch; otherwise fail
            if git push origin "refs/tags/${TAG}"; then
              echo "Tag '${TAG}' pushed to origin"
            else
              echo "::warning::git push for tag '${TAG}' failed, checking if tag already exists on origin"
              if git ls-remote --exit-code origin "refs/tags/${TAG}" >/dev/null 2>&1; then
                echo "Tag '${TAG}' already exists on origin (likely created by parallel job) — fetching"
                git fetch origin "refs/tags/${TAG}"
              else
                echo "::error::Failed to push tag '${TAG}' to origin and tag does not exist on origin"
                exit 1
              fi
            fi
          fi
          git checkout "refs/tags/${TAG}"

      - uses: ./.github/actions/dump-context
        if: github.event.inputs.debug_context == 'true'

      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Gate: build through the test stage — bats must pass
      - name: Build & run tests
        run: |
          GEMFILE_HASH=$(sha256sum docker/Gemfile.lock | cut -d' ' -f1)
          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            docker buildx build \
              --file docker/Dockerfile.terrarium \
              --target test \
              --platform ${{ matrix.platform }} \
              --build-arg GEMFILE_HASH="${GEMFILE_HASH}" \
              --cache-from type=gha,scope=${{ matrix.platform }} \
              --cache-to type=gha,mode=max,scope=${{ matrix.platform }} \
              ./docker \
              && { echo "::endgroup::"; break; } \
              || { echo "::endgroup::"; echo "::warning::Build attempt $attempt failed"; }
            if [ "$attempt" -eq 3 ]; then echo "::error::All 3 build attempts failed"; exit 1; fi
            sleep 30
          done

      # Push: build the clean final stage (no test artifacts)
      - name: Build & push final image
        run: |
          IMAGE="ghcr.io/${{ github.repository }}"
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
          else
            TAG="${{ inputs.tag }}"
          fi
          GEMFILE_HASH=$(sha256sum docker/Gemfile.lock | cut -d' ' -f1)

          for attempt in 1 2 3; do
            echo "::group::Attempt $attempt of 3"
            docker buildx build \
              --file docker/Dockerfile.terrarium \
              --target test \
              --platform ${{ matrix.platform }} \
              --push \
              --sbom=true \
              --build-arg GEMFILE_HASH="${GEMFILE_HASH}" \
              --cache-from type=gha,scope=${{ matrix.platform }} \
              --tag "${IMAGE}:${TAG}${{ matrix.suffix }}" \
              ./docker \
              && { echo "::endgroup::"; break; } \
              || { echo "::endgroup::"; echo "::warning::Push attempt $attempt failed"; }
            if [ "$attempt" -eq 3 ]; then echo "::error::All 3 push attempts failed"; exit 1; fi
            sleep 30
          done

  ################################################################################
  # 2 ────────── Create multi‑arch manifest ────────────────────────────────────
  ################################################################################
  manifest:
    name: Create & push multi-arch manifest
    needs: [release]
    runs-on: ubuntu-24.04
    permissions: { contents: read, packages: write }

    steps:
      - uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/dump-context
        if: github.event.inputs.debug_context == 'true'

      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tag and latest eligibility
        id: resolve
        run: |
          # Resolve tag from release event or workflow_dispatch input
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${{ github.event.release.tag_name }}"
            IS_PRERELEASE="${{ github.event.release.prerelease }}"
          else
            TAG="${{ inputs.tag }}"
            IS_PRERELEASE="false"
            # Auto-detect pre-release from tag name
            if [[ "$TAG" =~ -(pre|alpha|beta|rc) ]]; then
              IS_PRERELEASE="true"
            fi
          fi
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT
          echo "::notice::Tag=${TAG}, Pre-release=${IS_PRERELEASE}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ steps.resolve.outputs.tag }}
            type=raw,value=latest,enable=${{ steps.resolve.outputs.is_prerelease != 'true' }}

      - name: Create and push manifest
        uses: int128/docker-manifest-create-action@3de37de96c4e900bc3eef9055d3c50abdb4f769d # v2.18.0
        with:
          tags: ${{ steps.meta.outputs.tags }}
          sources: |
            ghcr.io/${{ github.repository }}:${{ steps.resolve.outputs.tag }}-linux-amd64
            ghcr.io/${{ github.repository }}:${{ steps.resolve.outputs.tag }}-linux-arm64
