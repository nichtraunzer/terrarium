name: Scan terrarium image (Trivy)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Also run after the build workflow completes (image may now be in GHCR)
  workflow_run:
    workflows: ["Build, test & publish terrarium"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  scan:
    name: Scan for security vulnerabilities
    # Skip if the triggering workflow failed (images weren't pushed)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dump-context

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try to pull published image
        id: pull
        continue-on-error: true
        run: docker pull "ghcr.io/${{ github.repository }}:latest"

      # Full image scan — only when a published image is available
      - name: Trivy image scan
        if: steps.pull.outcome == 'success'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      # Filesystem scan of Dockerfile + config — when no image is available
      # (avoids building the full image which times out the runner)
      - name: Trivy filesystem scan (no published image)
        if: steps.pull.outcome != 'success'
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: docker/
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          scanners: misconfig,secret

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
