name: Scan terrarium image (Trivy)

on:
  # Run after the build workflow completes on master
  workflow_run:
    workflows: ["Build, test & publish terrarium"]
    types: [completed]
    branches: [master]
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  scan:
    name: Scan for security vulnerabilities
    # Skip if the triggering workflow failed (images weren't pushed)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/dump-context

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image (or build locally if not yet published)
        run: |
          IMAGE="ghcr.io/${{ github.repository }}:latest"
          if docker pull "$IMAGE"; then
            echo "Pulled $IMAGE from registry"
          else
            echo "Image not in registry — building locally for scanning"
            docker build -f terraform/docker/Dockerfile.terrarium --target final \
              -t "$IMAGE" terraform/docker/
          fi

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
