# ── Permissions policy ──────────────────────────────────────────────────────
# Default: contents:read (workflow level).
# security-events:write — scan job only (SARIF upload).
# packages:read — scan job only (GHCR pull).
# ── Secret isolation policy ─────────────────────────────────────────────────
# No secrets in global env: blocks.
# GITHUB_TOKEN scoped to docker/login-action steps only.
name: Scan terrarium image (Trivy)

on:
  push:
    branches: [master]
    paths:
      - 'docker/**'
      - '.github/workflows/scan.yaml'
  pull_request:
    branches: [master]
    paths:
      - 'docker/**'
      - '.github/workflows/scan.yaml'
  # Also run after the build workflow completes (image may now be in GHCR)
  workflow_run:
    workflows: ["Build, test & publish terrarium"]
    types: [completed]
    branches: [master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      debug_context:
        description: "Dump GitHub contexts for debugging"
        type: boolean
        default: false
  schedule:
    - cron: "0 6 * * 1"  # Weekly Monday 06:00 UTC

permissions:
  contents: read

jobs:
  scan:
    name: Scan (${{ matrix.platform }})
    # Skip if the triggering workflow failed (images weren't pushed)
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            suffix: linux-amd64
            runner: ubuntu-24.04
          - platform: linux/arm64
            suffix: linux-arm64
            runner: ubuntu-24.04-arm

    steps:
      - uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: ./.github/actions/dump-context
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.debug_context == 'true'

      - name: Login to GHCR
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try to pull published image
        id: pull
        continue-on-error: true
        run: docker pull "ghcr.io/${{ github.repository }}:latest-${{ matrix.suffix }}"

      # Full image scan — only when a published image is available
      - name: Trivy image scan
        if: steps.pull.outcome == 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ghcr.io/${{ github.repository }}:latest-${{ matrix.suffix }}
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH,MEDIUM

      # Filesystem scan of Dockerfile + config — when no image is available
      # (avoids building the full image which times out the runner)
      - name: Trivy filesystem scan (no published image)
        if: steps.pull.outcome != 'success'
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          scan-type: fs
          scan-ref: docker/
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          scanners: misconfig,secret

      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4.35.1
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-${{ matrix.suffix }}
